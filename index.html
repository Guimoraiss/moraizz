    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Hub pessoal de Guilherme Morais com redes sociais, portfólios e projetos.">

        <link rel="icon" href="./assets/icons/logo.svg" type="image/svg+xml">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="assets/css/global.css">
        <link rel="stylesheet" href="assets/css/home.css">

        <title>Moraizz</title>
    </head>
    <body class="home-page">
        <header class="home-header" aria-label="Alternância de tema">
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Alternar tema">
                <span class="theme-toggle__thumb" aria-hidden="true"></span>
                <span class="theme-toggle__track" aria-hidden="true"></span>
            </button>
        </header>

        <main class="home-main">
            <section class="profile-card" aria-labelledby="profile-title">
                <div class="profile-card__photo" aria-hidden="true"></div>

                <h1 class="profile-card__title" id="profile-title">Guilherme Morais</h1>
                <p class="profile-card__subtitle">beginner dev👨‍💻</p>
                <p class="profile-card__instagram">Ig: @s1goli</p>

                <nav class="social-links" aria-label="Redes sociais">
                    <a class="social-links__item" href="https://github.com/Guimoraiss" target="_blank" rel="noopener noreferrer">
                        <img src="assets/icons/github-svgrepo-com.svg" width="48" alt="GitHub">
                    </a>

                    <a class="social-links__item" href="https://www.linkedin.com/in/guilherme-morais-8408b3221/" target="_blank" rel="noopener noreferrer">
                        <img src="assets/icons/linkedin-svgrepo-com.svg" width="48" alt="LinkedIn">
                    </a>

                    <a class="social-links__item" href="https://www.youtube.com/@moraizzz" target="_blank" rel="noopener noreferrer">
                        <img src="assets/icons/youtube-youtube-svgrepo-com.svg" width="48" alt="YouTube">
                    </a>
                </nav>
            </section>

                    <section class="portfolio-links" aria-label="Portfólios">
                    <a href="dev/index.html" class="portfolio-link-card">
            <div class="portfolio-link-card__media">
                <img
                    class="portfolio-link-card__image"
                    src="assets/icons/web dev logo.svg"
                    alt="Logo do portfólio de desenvolvimento web">
            </div>

            <div class="portfolio-link-card__content">
                <h2 class="portfolio-link-card__title">Portfólio Dev Web</h2>
            </div>
        </a>

                <a href="video/index.html" class="portfolio-link-card">
        <div class="portfolio-link-card__media">
            <img
                class="portfolio-link-card__image"
                src="assets/icons/MoraizEditor.svg"
                alt="Logo do portfólio de edição de vídeo">
        </div>

        <div class="portfolio-link-card__content">
            <h2 class="portfolio-link-card__title">Portfólio de Vídeo</h2>
        </div>
    </a>
            </section>

          <section class="audio-card" aria-labelledby="music-title">
    <div class="music-player" id="music-player">

        <audio id="music-audio"></audio>

        <div class="music-player__info">

            <p class="music-player__label">
                Projetos Que Participei
            </p>

            <h2
                class="music-player__title"
                id="music-title">
                Carregando...
            </h2>

            <div
                class="music-player__progress"
                id="music-progress">

                <div
                    class="music-player__progress-fill"
                    id="music-progress-fill">
                </div>

            </div>

            <div class="music-player__time">
                <span id="music-current-time">00:00</span>
                <span id="music-duration">00:00</span>
            </div>

        </div>

        <div class="music-player__controls">

            <button
                class="music-player__button"
                id="previous-button"
                type="button">
                ⏮
            </button>

            <button
                class="music-player__button music-player__button--play"
                id="play-pause-button"
                type="button">
                ▶
            </button>

            <button
                class="music-player__button"
                id="next-button"
                type="button">
                ⏭
            </button>

        </div>

    </div>
</section>
        </main>

        <script src="assets/js/global.js"></script>
        <script src="assets/js/home.js"></script>
    </body>
    </html>
